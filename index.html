<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICode HTML Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎉 AICode HTML Demo</h1>
            <p class="subtitle">简单、美观、响应式的网页示例</p>
        </header>

        <main class="main-content">
            <section class="card">
                <h2>关于这个项目</h2>
                <p>
                    这是一个使用现代 Web 技术构建的简单页面演示。
                    展示了 HTML5 语义化标签、CSS3 动画效果和 JavaScript 交互功能。
                </p>
                <p>
                    页面采用响应式设计，在手机、平板和桌面设备上都能良好显示。
                </p>
            </section>

            <section class="card features">
                <h2>✨ 功能特点</h2>
                <ul class="feature-list">
                    <li>📱 完全响应式布局</li>
                    <li>🎨 现代渐变背景设计</li>
                    <li>✨ 平滑的交互动画</li>
                    <li>⚡ 轻量级原生代码</li>
                </ul>
            </section>

            <section class="card interactive">
                <h2>🎯 交互演示</h2>
                <p>点击下方按钮体验 JavaScript 交互效果：</p>
                <div class="button-group">
                    <button id="alertBtn" class="btn btn-primary">
                        🔔 显示提示
                    </button>
                    <button id="themeBtn" class="btn btn-secondary">
                        🌙 切换主题
                    </button>
                    <button id="countBtn" class="btn btn-accent">
                        🔢 点击计数: <span id="count">0</span>
                    </button>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Made with 💻 by AICode | 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
